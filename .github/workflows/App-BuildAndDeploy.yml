name: Build APP For Pull Request (Generates .ipa)

on:
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: macos-14 # Usamos una Mac real en la nube de GitHub
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Install MAUI iOS Workload
        run: dotnet workload install

      - name: Install dependencies
        run: dotnet restore ./DecenaSoluciones.POS.App/DecenaSoluciones.POS.App.csproj

      - name: Build and Generate IPA
        run: |
          dotnet publish ./DecenaSoluciones.POS.App/DecenaSoluciones.POS.App.csproj \
          -f net8.0-ios \
          -c Release \
          -r ios-arm64 \
          -p:BuildIpa=true \
          -p:CodesignKey="-" \
          -p:CodesignProvision="-" \
          -p:ArchiveOnBuild=false

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MiApp-iOS
          path: ./DecenaSoluciones.POS.App/bin/Release/net8.0-ios/ios-arm64/publish/*.ipa